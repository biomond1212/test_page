<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제1회 '천년의 숨결' 현장 답사</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <!-- 내비게이션 -->
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="text-xl font-bold text-emerald-700">
                <i class="fa-solid fa-temple-bud mr-2"></i>한국불상연구
            </div>
            <div class="hidden md:flex space-x-8 font-medium">
                <a href="#" class="hover:text-emerald-600 transition">답사 소개</a>
                <a href="#" class="hover:text-emerald-600 transition">교수님 소개</a>
                <a href="#" class="hover:text-emerald-600 transition">커뮤니티</a>
            </div>
        </div>
    </nav>

    <!-- 히어로 섹션 -->
    <header class="relative bg-emerald-900 text-white py-20 px-4 overflow-hidden">
        <div class="absolute inset-0 opacity-20 bg-[url('https://images.unsplash.com/photo-1548115184-bc6544d06a58?auto=format&fit=crop&q=80&w=2000')] bg-cover bg-center"></div>
        <div class="max-w-4xl mx-auto relative z-10 text-center">
            <span class="inline-block px-4 py-1 bg-emerald-700 rounded-full text-sm font-semibold mb-6">제1회 현장 답사</span>
            <h1 class="text-4xl md:text-5xl font-bold mb-6 leading-tight">
                천년의 숨결, <br class="md:hidden"> 경주 남산에서 마주하는 불상의 미학
            </h1>
            <p class="text-lg md:text-xl text-emerald-100 mb-10 leading-relaxed">
                강의실에서 배운 불상의 아름다움을 현장에서 직접 확인하세요.<br>
                신대현 교수님의 실시간 해설과 함께하는 특별한 여정에 여러분을 초대합니다.
            </p>
            
            <!-- 탐사 신청하기 버튼 -->
            <button 
                onclick="openApplication()" 
                class="inline-flex items-center px-8 py-4 bg-white text-emerald-800 font-bold text-lg rounded-xl shadow-xl hover:bg-emerald-50 transform hover:-translate-y-1 transition duration-300 group"
            >
                탐사 신청하기
                <i class="fa-solid fa-arrow-up-right-from-square ml-3 group-hover:scale-110 transition"></i>
            </button>
        </div>
    </header>

    <!-- 안내 사항 -->
    <main class="max-w-5xl mx-auto py-16 px-4">
        <div class="grid md:grid-cols-3 gap-8 text-center">
            <div class="p-6 bg-white rounded-2xl shadow-sm border border-gray-100">
                <div class="w-12 h-12 bg-emerald-100 text-emerald-700 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-calendar-days text-xl"></i>
                </div>
                <h3 class="font-bold text-lg mb-2">일시</h3>
                <p class="text-gray-600">추후 공지 (주말 예정)</p>
            </div>
            <div class="p-6 bg-white rounded-2xl shadow-sm border border-gray-100">
                <div class="w-12 h-12 bg-emerald-100 text-emerald-700 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-location-dot text-xl"></i>
                </div>
                <h3 class="font-bold text-lg mb-2">장소</h3>
                <p class="text-gray-600">경주 남산 일대</p>
            </div>
            <div class="p-6 bg-white rounded-2xl shadow-sm border border-gray-100">
                <div class="w-12 h-12 bg-emerald-100 text-emerald-700 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-user-group text-xl"></i>
                </div>
                <h3 class="font-bold text-lg mb-2">대상</h3>
                <p class="text-gray-600">신대현 교수님 수강생</p>
            </div>
        </div>
    </main>

    <footer class="bg-gray-100 py-12 border-t">
        <div class="max-w-6xl mx-auto px-4 text-center">
            <p class="text-gray-500 text-sm">© 2024 한국불상연구 - 신대현 교수님 연구실</p>
            <p class="text-gray-400 text-xs mt-2">문의: 010-XXXX-XXXX</p>
        </div>
    </footer>

    <script>
        /**
         * 구글 폼 링크를 새 창으로 여는 함수
         */
        function openApplication() {
            const googleFormUrl = "https://forms.gle/rTYRcrukjUorbSmAA";
            window.open(googleFormUrl, '_blank');
        }
    </script>
</body>
</html>
